<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Experiment 5 - Calculators</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f0f0f0;
      margin-top: 2rem;
    }

    .container {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      margin: 20px auto;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border: 1px solid #ccc;
    }

    .container.active {
      display: block;
    }

    /* Basic Calc */
    input {
      width: 90%;
      padding: 8px;
      margin: 5px 0;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .base-btn {
      padding: 10px;
      font-size: 18px;
      margin: 5px;
      cursor: pointer;
      width: 40px;
    }

    /* Smart Calc */
    .screen {
      background: #eee;
      padding: 10px;
      text-align: right;
      font-size: 24px;
      min-height: 40px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .grid button {
      padding: 15px;
      font-size: 18px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
    }

    .grid button:hover {
      background: #ddd;
    }

    .grid .op {
      background: #fca311;
      color: white;
      border: none;
    }

    .grid .zero {
      grid-column: span 2;
    }

    /* Nav */
    button.nav {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
  </style>
</head>

<body>

  <h2>JavaScript Calculators</h2>

  <div>
    <button class="nav" onclick="show('basic')">Basic</button>
    <button class="nav" onclick="show('smart')">Smartphone</button>
  </div>

  <!-- Basic Calculator -->
  <div id="basic" class="container active">
    <h3>Basic</h3>
    <input type="number" id="n1" placeholder="Number 1">
    <input type="number" id="n2" placeholder="Number 2">
    <div>
      <button class="base-btn" onclick="calc('+')">+</button>
      <button class="base-btn" onclick="calc('-')">-</button>
      <button class="base-btn" onclick="calc('*')">*</button>
      <button class="base-btn" onclick="calc('/')">/</button>
    </div>
    <h3 id="res">Result: 0</h3>
  </div>

  <!-- Smart Calculator -->
  <div id="smart" class="container">
    <h3>Smartphone</h3>
    <div id="screen" class="screen">0</div>
    <div class="grid">
      <button onclick="s('AC')">C</button>
      <button onclick="s('DEL')">⌫</button>
      <button onclick="s('%')">%</button>
      <button class="op" onclick="s('/')">÷</button>
      <button onclick="s('7')">7</button>
      <button onclick="s('8')">8</button>
      <button onclick="s('9')">9</button>
      <button class="op" onclick="s('*')">×</button>
      <button onclick="s('4')">4</button>
      <button onclick="s('5')">5</button>
      <button onclick="s('6')">6</button>
      <button class="op" onclick="s('-')">-</button>
      <button onclick="s('1')">1</button>
      <button onclick="s('2')">2</button>
      <button onclick="s('3')">3</button>
      <button class="op" onclick="s('+')">+</button>
      <button class="zero" onclick="s('0')">0</button>
      <button onclick="s('.')">.</button>
      <button class="op" onclick="s('=')">=</button>
    </div>
  </div>

  <br><a href="../index.html">Back to Home</a>

  <script>
    // Tab Logic
    function show(id) {
      document.getElementById('basic').classList.remove('active');
      document.getElementById('smart').classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    // Basic Calc Logic
    function calc(op) {
      let a = parseFloat(document.getElementById('n1').value) || 0;
      let b = parseFloat(document.getElementById('n2').value) || 0;
      let r = 0;
      if (op === '+') r = a + b;
      if (op === '-') r = a - b;
      if (op === '*') r = a * b;
      if (op === '/') r = b === 0 ? 'Err' : a / b;
      document.getElementById('res').innerText = 'Result: ' + r;
    }

    // Smart Calc Logic
    let exp = "";
    function s(val) {
      let sc = document.getElementById('screen');
      if (val === 'AC') exp = "";
      else if (val === 'DEL') exp = exp.slice(0, -1);
      else if (val === '=') {
        try { exp = eval(exp).toString(); }
        catch { exp = "Err"; }
      }
      else if (val === '%') {
        try { exp = (eval(exp) / 100).toString(); }
        catch { exp = "Err"; }
      }
      else exp += val;

      sc.innerText = exp || "0";
      if (exp === "Err") exp = ""; // reset after error
    }
  </script>
</body>

</html>
